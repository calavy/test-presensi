    <style id="dynamic-theme">
        :root { --primary: #1e1b4b; --primary-dark: #0f172a; --secondary: #10b981; --accent: #f59e0b; --bg-light: #f8fafc; }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); overflow: hidden; height: 100vh; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-link.active { border-left: 4px solid var(--accent); color: var(--accent); font-weight: 800; background: rgba(255,255,255,0.05); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #fff; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.7); }
        .clock-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        #qr-reader video { border-radius: 1.5rem; object-fit: cover; width: 100% !important; }
        .scan-overlay { position: absolute; inset: 0; border: 2px dashed rgba(255,255,255,0.3); border-radius: 1.5rem; pointer-events: none; z-index: 5; animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0%, 100% { border-color: rgba(255,255,255,0.2); } 50% { border-color: var(--accent); } }
    </style>
</head>
<body class="flex h-screen text-slate-900">

                <p class="px-4 text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Manajemen Data</p>

        <div class="p-8"><button onclick="window.handleLogout()" class="w-full p-4 bg-rose-500/10 text-rose-500 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-rose-500 hover:text-white transition-all">Log Out System</button></div>

    <main id="main-content" class="flex-1 flex flex-col hidden bg-slate-50 overflow-hidden">

    <!-- Screen Login -->
    <div id="login-screen" class="fixed inset-0 z-[300] hidden items-center justify-center bg-[#0f172a] p-6">
        <div class="bg-white w-full max-w-md rounded-[4rem] shadow-2xl overflow-hidden animate-in">
            <div class="p-12 text-center bg-indigo-900 text-white relative">

                    <button id="tab-petugas" onclick="window.switchLoginTab('petugas')" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-400">Petugas Piket</button>

    <div id="splash-screen" class="fixed inset-0 z-[500] bg-indigo-950 flex flex-col items-center justify-center text-white">
        <div class="spinner mb-6"></div>
        <h2 class="text-2xl font-black uppercase tracking-tighter">NAILUL MUNA</h2>
        <p class="text-[9px] font-bold uppercase tracking-[0.5em] mt-2 opacity-50">SYNCING CLOUD DATA...</p>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-full shadow-2xl z-[2000] opacity-0 transition-all text-[10px] font-black uppercase tracking-widest pointer-events-none">
        <span id="toast-msg"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot, addDoc, updateDoc, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variables
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nailul-muna-official';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyA3USbfzVYgH0zpmHlYewurFeFSC4P_y28",
            authDomain: "absensi-wajah-a5262.firebaseapp.com",
            projectId: "absensi-wajah-a5262",
            storageBucket: "absensi-wajah-a5262.firebasestorage.app",
            messagingSenderId: "136628217360",
            appId: "1:136628217360:web:0ccc83861ca1a120facc95"
        };
        
        let app, auth, db;
        
        // --- GLOBAL STATE ---
        window.dataSantriMaster = []; window.dataSantriAktif = []; window.dataPresensi = []; window.dataIzin = []; window.dataAdmins = []; window.dataJadwal = [];
        window.pondokIdentity = { 
            name: "Nailul Muna", address: "Kediri, Jawa Timur", pengasuh: "K.H. Ahmad Dahlan", themeColor: "#1e1b4b", tamuPass: "tamu123",
            fonnteKey: "", waPenerima: "", logo: "https://via.placeholder.com/100", periode: "2024/2025", superPass: "admin", 
            batasAlpa: 5, batasTelat: 10, waReportTime: "21:00", alpaThreshold: 3,
            baikThreshold: 85, sedangThreshold: 70, waAutoAlpaLimit: 3
        };
        window.tingkatanList = ["I'dad", "Ula", "Wustha", "Ulya"];
        window.hijriMonths = ["Muharram", "Safar", "Rabi'ul Awwal", "Rabi'ul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Sya'ban", "Ramadhan", "Syawwal", "Dzulqa'dah", "Dzulhijjah"];
        window.currentUserRole = localStorage.getItem('nm_role') || null;
        window.currentSettingsTab = 'profile';
        window.rekapFilter = { nama: "", tingkatan: "", mode: "harian", bulan: new Date().getMonth() + 1, tahun: new Date().getFullYear(), calendarMode: 'masehi' };
        window.selectedIzinNis = null;
        window.lastWAReportDate = localStorage.getItem('nm_last_wa_report') || '';

        // Jalur Database
        const getPublicCol = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
        const getPublicDoc = (col, docId) => doc(db, 'artifacts', appId, 'public', 'data', col, docId);

        // Helper Romawi
        window.romanize = (num) => {
            if (isNaN(num)) return NaN;
            var digits = String(+num).split(""),
                key = ["","C","CC","CCC","CD","D","DC","DCC","DCCC","CM",
                       "","X","XX","XXX","XL","L","LX","LXX","LXXX","XC",
                       "","I","II","III","IV","V","VI","VII","VIII","IX"],
                roman = "", i = 3;
            while (i--) roman = (key[+digits.pop() + (i * 10)] || "") + roman;
            return Array(+digits.join("") + 1).join("M") + roman;
        };

        // --- STATS & LOGIC ---
        window.calculateSantriMonthlyStats = (nis, bulan, tahun, calendarMode) => {
            const santri = window.dataSantriAktif.find(s => s.nis === nis);
            if(!santri) return { hadir:0, alpa:0, izin:0, sakit:0, total:0 };
            let hadir = 0, alpa = 0, izin = 0, sakit = 0, total_harus = 0;
            const now = new Date();
            const lastDay = (now.getMonth() + 1 === bulan && now.getFullYear() === tahun) ? now.getDate() : new Date(tahun, bulan, 0).getDate();
            for (let d = 1; d <= lastDay; d++) {
                const checkDate = new Date(tahun, bulan - 1, d);
                const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                const dayName = dayNames[checkDate.getDay()];
                const dateString = checkDate.toISOString().split('T')[0];
                const validSchedules = window.dataJadwal.filter(j => {
                    const matchDay = (j.hari || []).includes(dayName);
                    const matchTingkat = (j.tingkatan || []).length === 0 || j.tingkatan.includes(santri.tingkatan);
                    return matchDay && matchTingkat;
                });
                validSchedules.forEach(sch => {
                    total_harus++;
                    const isPresent = window.dataPresensi.find(p => p.nis === nis && p.jadwal === sch.nama && new Date(p.timestamp).toISOString().split('T')[0] === dateString);
                    if(isPresent) { hadir++; } else {
                        const [schH, schM] = sch.waktuMulai.split(':').map(Number);
                        const schDateTime = new Date(tahun, bulan - 1, d, schH, schM).getTime();
                        const isOnLeave = window.dataIzin.find(i => {
                            if (i.nis !== nis) return false;
                            const startD = new Date(i.tglMulai + (i.jamMulai ? 'T' + i.jamMulai : 'T00:00')).getTime();
                            const endD = new Date(i.tglSelesai + (i.jamSelesai ? 'T' + i.jamSelesai : 'T23:59')).getTime();
                            return schDateTime >= startD && schDateTime <= endD;
                        });
                        if(isOnLeave) { if(isOnLeave.kriteria === 'Sakit') sakit++; else izin++; } 
                        else { if(now.getTime() > schDateTime) alpa++; }
                    }
                });
            }
            return { hadir, alpa, izin, sakit, total: total_harus };
        };

        window.calculateKriteria = (hadir, total) => {
            if (total === 0) return "SEDANG";
            const p = (hadir / total) * 100;
            if (p >= (window.pondokIdentity.baikThreshold || 85)) return "BAIK";
            if (p >= (window.pondokIdentity.sedangThreshold || 70)) return "SEDANG";
            return "BURUK";
        };

        // --- UTILS ---
        window.getFormattedDates = () => ({ masehi: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) });
        window.updateHeaders = () => { const { masehi } = window.getFormattedDates(); const mEl = document.getElementById('masehi-date-header'); if(mEl) mEl.innerText = masehi; };
        window.updateDashboardTime = () => { const el = document.getElementById('dash-live-clock'); if(el) { const now = new Date(); el.innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0'); } };
        window.showToast = (msg) => { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 3000); };
        window.toggleSidebar = (s) => { const sidebar = document.getElementById('main-sidebar'); const overlay = document.getElementById('sidebar-overlay'); if(s) { sidebar.classList.remove('hidden'); sidebar.classList.add('flex'); overlay.classList.remove('hidden'); } else { sidebar.classList.add('hidden'); sidebar.classList.remove('flex'); overlay.classList.add('hidden'); } };
        window.openModal = (h) => { document.getElementById('modal-content').innerHTML = h; document.getElementById('modal-global').classList.remove('hidden'); document.getElementById('modal-global').classList.add('flex'); };
        window.closeModal = () => document.getElementById('modal-global').classList.add('hidden');

        // --- SISTEM SINKRONISASI ---
        window.startSync = () => {
            if (!auth.currentUser) return;
            const onSyncError = (err) => { console.error("Sync error:", err); window.showToast("Koneksi Cloud Terputus."); };

            onSnapshot(getPublicDoc('configs', 'master'), (s) => {
                if(s.exists()){
                    const d = s.data(); 
                    window.pondokIdentity = { ...window.pondokIdentity, ...d.pondokIdentity };
                    window.tingkatanList = d.tingkatanList || window.tingkatanList;
                    window.updateTheme();
                }
            }, onSyncError);

            ['santri_induk', 'santri_aktif', 'presensi', 'izin', 'admins', 'jadwal'].forEach(c => {
                onSnapshot(getPublicCol(c), (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (c === 'santri_induk') window.dataSantriMaster = data;
                    if (c === 'santri_aktif') window.dataSantriAktif = data;
                    if (c === 'presensi') window.dataPresensi = data;
                    if (c === 'izin') window.dataIzin = data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    if (c === 'jadwal') window.dataJadwal = data.sort((a,b) => a.waktuMulai.localeCompare(b.waktuMulai));
                    if (c === 'admins') window.dataAdmins = data;
                    
                    const renderMap = { 'dashboard': 'renderDashboard', 'rekap': 'renderRekap', 'izin': 'renderIzin', 'aktif': 'renderAktif', 'data-induk': 'renderMaster', 'settings': 'renderSettings' };
                    if (renderMap[window.currentPage] && typeof window[renderMap[window.currentPage]] === 'function') window[renderMap[window.currentPage]]();
                }, onSyncError);
            });
        };

        window.updateTheme = () => {
            const c = window.pondokIdentity.themeColor;
            document.getElementById('dynamic-theme').innerHTML = `:root { --primary: ${c}; --primary-dark: #000; --accent: #f59e0b; }`;
            document.querySelectorAll('#side-pondok-name, #login-pondok-name').forEach(el => { if(el) el.innerText = window.pondokIdentity.name; });
            document.getElementById('side-periode').innerText = "PERIODE: " + (window.pondokIdentity.periode || '--');
            const logo = window.pondokIdentity.logo || 'https://via.placeholder.com/100';
            document.getElementById('side-logo').src = logo;
            document.getElementById('login-logo').src = logo;
        };

        // --- DASHBOARD ---
        window.getActiveSchedules = () => {
            const now = new Date();
            const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const today = dayNames[now.getDay()];
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            return window.dataJadwal.filter(j => {
                const days = j.hari || [];
                if (!days.includes(today)) return false;
                const start = j.waktuMulai;
                const [h, m] = start.split(':').map(Number);
                const startObj = new Date(); startObj.setHours(h, m, 0);
                const endObj = new Date(startObj.getTime() + (parseInt(j.durasi) || 60) * 60000);
                const endStr = endObj.getHours().toString().padStart(2, '0') + ":" + endObj.getMinutes().toString().padStart(2, '0');
                return currentTime >= start && currentTime <= endStr;
            });
        };

        window.renderDashboard = () => {
            const nowTime = new Date().getTime();
            const santriIzin = window.dataIzin.filter(i => {
                if (i.status === 'Selesai') return false;
                const startD = new Date(i.tglMulai + (i.jamMulai ? 'T' + i.jamMulai : 'T00:00')).getTime();
                return nowTime >= startD;
            });
            const uniqueIzinNis = new Set(window.dataIzin.map(i => i.nis));
            const activeSchedules = window.getActiveSchedules();
            const { masehi } = window.getFormattedDates();
            
            document.getElementById('content-area').innerHTML = `
            <div class="space-y-10 animate-in pb-20">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="clock-gradient md:col-span-2 p-8 rounded-[2.5rem] shadow-2xl flex flex-col justify-center items-center h-52 text-white relative">
                        <h3 id="dash-live-clock" class="text-5xl font-black tracking-tighter mb-4">00:00:00</h3>

                const prev = document.getElementById('set-logo-preview');
                if(prev) prev.src = e.target.result;
                window.showToast("Logo Terunggah! Klik Simpan ke Cloud."); 
            }; 
            r.readAsDataURL(file); 
        };

        window.deleteData = async (col, id) => { if(confirm("Hapus data ini selamanya dari Cloud?")) await deleteDoc(getPublicDoc(col, id)); };
        window.handleRegMaster = async (e) => { e.preventDefault(); try { await addDoc(getPublicCol('santri_induk'), { nis: document.getElementById('reg-nis').value, nama: document.getElementById('reg-nama').value, jk: document.getElementById('reg-jk').value, timestamp: Date.now() }); e.target.reset(); window.showToast("Disimpan!"); } catch(e) {} };
        window.handleSearchIzin = (v) => { const res = document.getElementById('iz-results'); if(!v) { res.classList.add('hidden'); return; } const filtered = window.dataSantriAktif.filter(s => s.nama.toLowerCase().includes(v.toLowerCase())); res.innerHTML = filtered.map(s => `<div onclick="window.selectIzinSantri('${s.nis}', '${s.nama}')" class="p-4 hover:bg-indigo-50 cursor-pointer border-b text-xs uppercase font-bold">${s.nama} (${s.nis})</div>`).join('') || '<p class="p-4 text-xs italic">Santri tidak ditemukan.</p>'; res.classList.remove('hidden'); };
        window.selectIzinSantri = (nis, nama) => { window.selectedIzinNis = nis; document.getElementById('iz-search').value = nama; document.getElementById('iz-results').classList.add('hidden'); };
        
        window.handleExcelImport = async (input) => {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); const batch = writeBatch(db);
                    for(let row of rows) { if(row.NAMA && row.NIS) { const ref = doc(getPublicCol('santri_induk')); batch.set(ref, { nama: String(row.NAMA), nis: String(row.NIS), jk: row.JK || 'L', timestamp: Date.now() }); } }
                    await batch.commit(); window.showToast("IMPORT MASTER BERHASIL!");
                } catch(err) { window.showToast("Gagal mengolah file Excel."); }
            };
            reader.readAsArrayBuffer(file);
        };

        window.handleExcelImportAktif = async (input) => {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); const batch = writeBatch(db);
                    for(let row of rows) { if(row.NAMA && row.NIS) { const ref = doc(getPublicCol('santri_aktif')); batch.set(ref, { nama: String(row.NAMA), nis: String(row.NIS), qrKey: row.QR_KEY ? String(row.QR_KEY) : 'NM-' + row.NIS, tingkatan: row.TINGKATAN || "Ula", status: 'Aktif', timestamp: Date.now() }); } }
                    await batch.commit(); window.showToast("IMPORT BERHASIL!");
                } catch(err) { window.showToast("Gagal mengolah file Excel."); }
            };
            reader.readAsArrayBuffer(file);
        };

        window.renderAktivasiForm = () => {
            window.openModal(`
                <div class="space-y-8 p-4">
                    <h3 class="text-2xl font-black uppercase text-indigo-950 tracking-tighter leading-none">Aktivasi Santri Baru</h3>
                    <div class="space-y-6">
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">Pilih dari Database Induk</label><select id="akt-santri-select" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold text-xs uppercase"><option value="">-- PILIH SANTRI --</option>${window.dataSantriMaster.filter(m => !window.dataSantriAktif.find(a => a.nis === m.nis)).map(m => `<option value="${m.nis}">${m.nis} - ${m.nama}</option>`).join('')}</select></div>
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">Tetapkan Tingkatan</label><select id="akt-tingkat-select" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold text-xs uppercase">${window.tingkatanList.map(t => `<option value="${t}">${t}</option>`).join('')}</select></div>
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">ID QR Khusus (Opsional)</label><input id="akt-qr-input" placeholder="Kosongkan untuk otomatis" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold text-xs"></div>
                        <button onclick="window.submitAktivasi()" class="w-full py-6 btn-primary text-white rounded-3xl font-black uppercase tracking-widest shadow-xl">AKTIFKAN SEKARANG</button>
                    </div>
                </div>`);
        };

        window.submitAktivasi = async () => {
            const nis = document.getElementById('akt-santri-select').value; 
            const tingkat = document.getElementById('akt-tingkat-select').value; 
            const customQR = document.getElementById('akt-qr-input').value.trim();
            if(!nis) return window.showToast("Pilih santri terlebih dahulu!"); 
            const m = window.dataSantriMaster.find(x => x.nis === nis);
            try { 
                await addDoc(getPublicCol('santri_aktif'), { nama: m.nama, nis: m.nis, jk: m.jk, tingkatan: tingkat, status: 'Aktif', qrKey: customQR || ('NM-' + m.nis), timestamp: Date.now() }); 
                window.showToast("SANTRI BERHASIL DIAKTIFKAN!"); 
                window.closeModal(); 
            } catch(e) { window.showToast("Gagal menyimpan ke Cloud."); }
        };

        window.renderEditAktifForm = (id) => {
            const s = window.dataSantriAktif.find(x => x.id === id);
            window.openModal(`
                <div class="space-y-8 p-4">
                    <h3 class="text-2xl font-black uppercase text-indigo-950 tracking-tighter leading-none">Edit Data Santri</h3>
                    <div class="space-y-6">
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">Nama Lengkap</label><input id="edit-nama" value="${s.nama}" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold uppercase text-xs"></div>
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">Tingkatan / Kelas</label><select id="edit-tingkat" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold text-xs uppercase">${window.tingkatanList.map(t => `<option value="${t}" ${t === s.tingkatan ? 'selected' : ''}>${t}</option>`).join('')}</select></div>
                        <div class="space-y-2"><label class="text-[9px] font-black uppercase text-slate-400 ml-4">ID QR Scanner</label><input id="edit-qr" value="${s.qrKey || s.nis}" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold text-xs"></div>
                        <button onclick="window.submitEditAktif('${id}')" class="w-full py-6 btn-primary text-white rounded-3xl font-black uppercase tracking-widest shadow-xl">SIMPAN PERUBAHAN</button>
                    </div>
                </div>`);
        };

        window.submitEditAktif = async (id) => {
            const n = document.getElementById('edit-nama').value; 
            const t = document.getElementById('edit-tingkat').value; 
            const qr = document.getElementById('edit-qr').value.trim();
            try { 
                await updateDoc(getPublicDoc('santri_aktif', id), { nama: n, tingkatan: t, qrKey: qr }); 
                window.showToast("DATA DIPERBARUI!"); 
                window.closeModal(); 
            } catch(e) { window.showToast("Gagal memperbarui data."); }
        };

        window.showQRCard = (id) => {
            const s = window.dataSantriAktif.find(x => x.id === id); 
            const qr = qrcode(4, 'L'); 
            qr.addData(s.qrKey || s.nis); 
            qr.make();
            window.openModal(`
                <div class="p-8 flex flex-col items-center space-y-8 animate-in">
                    <div class="bg-indigo-900 p-6 rounded-[2rem] text-white w-full shadow-xl">
                        <p class="text-[7px] font-black uppercase tracking-[0.4em] opacity-50 mb-1">Kartu Identitas Digital</p>
                        <h4 class="font-black uppercase text-sm tracking-tight">${window.pondokIdentity.name}</h4>
                    </div>
                    <div class="relative">
                        <img src="${qr.createDataURL(8)}" class="w-56 h-56 border-8 border-white shadow-2xl rounded-3xl">
                        <div class="absolute -bottom-4 bg-indigo-600 text-white px-6 py-2 rounded-full text-[9px] font-black shadow-lg">SCAN ME</div>
                    </div>
                    <div class="text-center">
                        <h3 class="text-2xl font-black uppercase tracking-tighter text-slate-800">${s.nama}</h3>
                        <p class="text-xs font-bold text-slate-400 mt-1">NIS: ${s.nis} • ${s.tingkatan}</p>
                    </div>
                    <button onclick="window.printQRCard()" class="w-full py-4 bg-slate-50 border rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-slate-100"><i class="fas fa-print mr-2"></i> Cetak Kartu</button>
                </div>`);
        };

        window.printQRCard = () => { window.showToast("Fungsi cetak kartu sedang disiapkan."); };

        window.exportRekapPDF = () => {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF('p', 'mm', 'a4');
            const p = window.pondokIdentity;
            
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text("LAPORAN REKAPITULASI PRESENSI", 105, 20, { align: 'center' });
            doc.setFontSize(12);
            doc.text(p.name.toUpperCase(), 105, 28, { align: 'center' });
            
            const head = [['Nama Santri', 'Tingkatan', 'Kegiatan', 'Status', 'Waktu']];
            const body = window.dataPresensi.map(p => [
                p.nama.toUpperCase(), 
                "-", 
                p.jadwal.toUpperCase(), 
                p.status.toUpperCase(), 
                new Date(p.timestamp).toLocaleString('id-ID')
            ]);
            
            doc.autoTable({ 
                head, 
                body, 
                startY: 40,
                styles: { fontSize: 8, cellPadding: 3 },
                headStyles: { fillColor: [30, 27, 75] }
            });
            
            doc.save(`Rekapitulasi_${new Date().toLocaleDateString()}.pdf`);
        };
    </script>
</body>
</html>
